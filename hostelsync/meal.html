<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HostelSync | Meal Booking</title>

<link rel="stylesheet" href="css/meal.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>


<div class="container">


<div class="header">

<h1>🍽 Meal Booking</h1>

<p>Book your meals and help reduce food waste.</p>

</div>




<div class="stats">


<div class="stat-card">

<h3>🌱 Food Saved</h3>

<h2>18 Kg</h2>

</div>



<div class="stat-card">

<h3>⏳ Dinner Closes In</h3>

<h2>02 : 14 : 35</h2>

</div>



<div class="stat-card">

<h3>📅 Today's Date</h3>

<h2>25 June 2026</h2>

</div>


</div>





<div class="meal-section">



<!-- Breakfast -->


<div class="meal-card">

<h2>🥞 Breakfast</h2>


<label><input type="checkbox"> Idli</label>

<label><input type="checkbox"> Dosa</label>

<label><input type="checkbox"> Pongal</label>

<label><input type="checkbox"> Poori</label>


<button onclick="bookMeal('Breakfast')">

Book Breakfast

</button>


</div>





<!-- Lunch -->



<div class="meal-card">


<h2>🍚 Lunch</h2>


<label><input type="checkbox"> Rice</label>

<label><input type="checkbox"> Sambar</label>

<label><input type="checkbox"> Poriyal</label>

<label><input type="checkbox"> Curd</label>



<button onclick="bookMeal('Breakfast')">

Book Lunch

</button>


</div>






<!-- Dinner -->


<div class="meal-card">


<h2>🥙 Dinner</h2>



<label><input type="checkbox"> Chapati</label>

<label><input type="checkbox"> Kurma</label>

<label><input type="checkbox"> Dosa</label>

<label><input type="checkbox"> Milk</label>


<button onclick="bookMeal('Dinner')">

Book Dinner

</button>



</div>



</div>






<div class="skip-card">


<h2>

🚫 Skip Meal

</h2>


<p>

Going out today?

Help us reduce food waste.

</p>


<button onclick="skipMeal()">

Skip Today's Meal

</button>



</div>




</div>


<script src="js/meal.js"></script>

</body>

</html>
