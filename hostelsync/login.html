<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>HostelSync | Login</title>

<link rel="stylesheet"
href="css/login.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>


<body>



<div class="container">


<!-- LEFT -->


<div class="left">


<h1>

🏠 HostelSync

</h1>


<h3>

Smart Hostel Management
Made Simple

</h3>



<div class="features">


<p>

🌱 Reduce Food Waste

</p>



<p>

🍽 Smart Meal Booking

</p>



<p>

📊 Hostel Analytics

</p>



<p>

📢 Real-Time Notices

</p>



<p>

👨🏻‍💼 Admin Monitoring

</p>



</div>



</div>





<!-- RIGHT -->


<div class="right">



<div class="login-card">



<h2>

Welcome Back

</h2>


<p>

Login to continue

</p>



<form>



<label>

Role

</label>



<select id="role">


<option>

Student

</option>



<option>

Admin

</option>



<option>

Warden

</option>


</select>




<label>

Email

</label>



<input
type="email"
id="email"
placeholder="Enter Email"
required>





<label>

Password

</label>




<div class="password-box">


<input
type="password"

id="password"

placeholder="Enter Password"

required>




<i class="fa-solid fa-eye"

id="togglePassword">

</i>



</div>






<div class="options">



<label>

<input type="checkbox">

Remember Me


</label>




<a href="#">

Forgot Password?


</a>



</div>





<button>

Login

</button>





<div class="register">



New Student?


<a href="register.html">

Create Account


</a>



</div>




</form>




</div>



</div>



</div>




<script src="js/login.js"></script>


</body>

</html>
